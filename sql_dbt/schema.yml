version: 2

models:

  # ══════════════════════════════════════════════════════════════════════
  # FCT_DPOS_BAL — Daily deposit balance snapshot
  # ══════════════════════════════════════════════════════════════════════
  - name: fct_dpos_bal
    description: >
      Daily deposit account balance snapshot. Grain: DPOS_AGMT_ID + BAL_DT.
      Covers all deposit product types: CASA (Current/Savings), Fixed Deposit,
      Recurring Deposit, Notice Deposit, Call Deposit, Structured Deposit,
      Islamic Murabaha, Islamic Wakala.
    columns:
      - name: dpos_agmt_id
        description: Deposit Agreement identifier — PK component 1
        tests:
          - not_null
          - relationships:
              to: source('core_banking_ods', 'dpos_agmt')
              field: dpos_agmt_id
      - name: bal_dt
        description: Balance snapshot date — load date (PK component 2)
        tests:
          - not_null
      - name: prty_id
        description: Party identifier — FK to PRTY
        tests:
          - not_null
      - name: prod_id
        description: Product identifier — FK to PROD
        tests:
          - not_null
      - name: brch_id
        description: Branch identifier — FK to BRCH
        tests:
          - not_null
      - name: dpos_typ_cd
        description: Deposit product type code
        tests:
          - not_null
          - accepted_values:
              values: ['CASA_C','CASA_S','TERM_F','RECR_D','NTIC_D','CALL_D','STRC_D','ISLM_M','ISLM_W']
      - name: dpos_typ_desc
        description: Human-readable deposit type description
        tests:
          - not_null
      - name: dpos_stat_cd
        description: Account status — closed accounts excluded by source filter
        tests:
          - not_null
          - accepted_values:
              values: ['ACT','DRM','PND','MAT','FRZ']
      - name: crncy_cd
        description: ISO 4217 currency code
        tests:
          - not_null
          - dbt_expectations.expect_column_value_lengths_to_equal:
              value: 3
      - name: curr_bal_amt
        description: Current balance — ZEROIFNULL applied
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
      - name: avail_bal_amt
        description: Available balance — must be <= curr_bal_amt
        tests:
          - not_null
      - name: casa_ind
        description: CASA product flag
        tests:
          - not_null
          - accepted_values:
              values: ['Y','N']
      - name: term_depos_ind
        description: Term deposit flag
        tests:
          - not_null
          - accepted_values:
              values: ['Y','N']
      - name: islm_ind
        description: Islamic product flag
        tests:
          - not_null
          - accepted_values:
              values: ['Y','N']
      - name: dormant_ind
        description: Dormant account flag
        tests:
          - not_null
          - accepted_values:
              values: ['Y','N']
      - name: tax_wthhd_ind
        description: Withholding tax applicable flag
        tests:
          - not_null
          - accepted_values:
              values: ['Y','N']
      - name: etl_cret_ts
        description: ETL load timestamp
        tests:
          - not_null
    tests:
      - unique:
          column_name: "dpos_agmt_id || '|' || bal_dt"
      - dbt_expectations.expect_compound_columns_to_be_unique:
          column_list: ['dpos_agmt_id', 'bal_dt']

  # ══════════════════════════════════════════════════════════════════════
  # FCT_DPOS_EVNT — Deposit transaction event fact
  # ══════════════════════════════════════════════════════════════════════
  - name: fct_dpos_evnt
    description: >
      Deposit transaction event fact. Grain: EVNT_ID.
      Source: UNION ALL of DPOS_EVNT (current, <12 months) and DPOS_EVNT_ARCV
      (archive, >=12 months). Reversed transactions excluded.
    columns:
      - name: evnt_id
        description: Event (transaction) identifier — PK
        tests:
          - not_null
          - unique
      - name: dpos_agmt_id
        description: FK to DPOS_AGMT
        tests:
          - not_null
      - name: evnt_dt
        description: Business event date
        tests:
          - not_null
      - name: evnt_typ_cd
        description: Event type code
        tests:
          - not_null
          - accepted_values:
              values: ['DEPOS','WTHDR','INTRC','FEECD','CHGCD','TAXWH','CLSPR','RNWPR','PENLT','ISLMP']
      - name: evnt_typ_desc
        description: Human-readable event type description
        tests:
          - not_null
      - name: evnt_catg_cd
        description: Event category grouping
        tests:
          - not_null
          - accepted_values:
              values: ['FUNDING','WITHDRAWAL','INTEREST','FEE_TAX','OTHER']
      - name: dpos_typ_cd
        description: Deposit product type from parent agreement
        tests:
          - not_null
          - accepted_values:
              values: ['CASA_C','CASA_S','TERM_F','RECR_D','NTIC_D','CALL_D','STRC_D','ISLM_M','ISLM_W']
      - name: dr_cr_ind
        description: Debit/Credit indicator
        tests:
          - not_null
          - accepted_values:
              values: ['D','C']
      - name: evnt_amt
        description: Transaction amount — always positive/unsigned
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              strictly: true
      - name: signed_amt
        description: Signed amount — credits positive, debits negative
        tests:
          - not_null
      - name: crncy_cd
        description: ISO 4217 currency
        tests:
          - not_null
      - name: revrs_ind
        description: Reversal flag — must always be N in this fact
        tests:
          - not_null
          - accepted_values:
              values: ['N']
      - name: stat_cd
        description: Transaction status
        tests:
          - not_null
          - accepted_values:
              values: ['PST','PND','REJ','RVS']
      - name: data_src
        description: Source lineage — CURRENT or ARCHIVE
        tests:
          - not_null
          - accepted_values:
              values: ['CURRENT','ARCHIVE']
      - name: etl_cret_ts
        description: ETL load timestamp
        tests:
          - not_null

  # ══════════════════════════════════════════════════════════════════════
  # FCT_INTRS_ACCRL — Daily interest accrual fact
  # ══════════════════════════════════════════════════════════════════════
  - name: fct_intrs_accrl
    description: >
      Daily interest accrual per deposit account. Grain: DPOS_AGMT_ID + ACCRL_DT.
      Covers conventional and Islamic (profit) accruals. Includes MTD and YTD
      cumulative window aggregations. Reversed accruals excluded.
    columns:
      - name: dpos_agmt_id
        description: Deposit Agreement identifier — PK component 1
        tests:
          - not_null
      - name: accrl_dt
        description: Accrual date — PK component 2
        tests:
          - not_null
      - name: prty_id
        description: Party identifier
        tests:
          - not_null
      - name: prod_id
        description: Product identifier
        tests:
          - not_null
      - name: dpos_typ_cd
        description: Deposit product type
        tests:
          - not_null
          - accepted_values:
              values: ['CASA_C','CASA_S','TERM_F','RECR_D','NTIC_D','CALL_D','STRC_D','ISLM_M','ISLM_W']
      - name: accrl_amt
        description: Daily accrual amount — must be >= 0
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
      - name: effctv_intrst_rt
        description: Effective interest rate on accrual date
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100
      - name: accrl_mthd_cd
        description: Accrual method
        tests:
          - not_null
          - accepted_values:
              values: ['ACT365','ACT360','30360']
      - name: days_accrd_cnt
        description: Days in accrual period
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
              max_value: 366
      - name: gross_accrl_amt
        description: Gross accrual before withholding tax
        tests:
          - not_null
      - name: tax_wthhd_amt
        description: Withholding tax — ZEROIFNULL applied
        tests:
          - not_null
      - name: net_accrl_amt
        description: Net accrual = gross - tax
        tests:
          - not_null
      - name: crncy_cd
        description: ISO 4217 currency
        tests:
          - not_null
      - name: revrs_ind
        description: Reversal flag — must always be N
        tests:
          - not_null
          - accepted_values:
              values: ['N']
      - name: cumul_accrl_amt_mtd
        description: Running MTD cumulative accrual — ZEROIFNULL applied
        tests:
          - not_null
      - name: cumul_accrl_amt_ytd
        description: Running YTD cumulative accrual — ZEROIFNULL applied
        tests:
          - not_null
      - name: etl_cret_ts
        description: ETL load timestamp
        tests:
          - not_null
    tests:
      - unique:
          column_name: "dpos_agmt_id || '|' || accrl_dt"
      - dbt_expectations.expect_compound_columns_to_be_unique:
          column_list: ['dpos_agmt_id', 'accrl_dt']
